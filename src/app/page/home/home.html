<div class="container">
    <header class="header">
        <h1>Welcome to <span class="brand">AppPortal</span></h1>
        <p>Your simplified central management system.</p>
    </header>

    <div class="grid">
        <div class="card" *ngFor="let item of features" (click)="gotoPage(item.path)">
            <div class="icon">{{ item.icon }}</div>
            <div class="info">
                <h3>{{ item.title }}</h3>
                <p>{{ item.description }}</p>
            </div>
            <div class="arrow">→</div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 Myapp. Developing by MYAP</p>
    </footer>
</div>
